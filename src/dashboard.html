<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lore dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base: #0f172a;
  --bg-surface: #1e293b;
  --bg-surface-hover: #263548;
  --bg-elevated: #334155;
  --bg-active: #1e3a5f;
  --border: #1e293b;
  --border-light: #334155;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #38bdf8;
  --accent-dim: #0ea5e9;
  --green: #22c55e;
  --green-bg: rgba(34, 197, 94, 0.12);
  --yellow: #eab308;
  --yellow-bg: rgba(234, 179, 8, 0.12);
  --red: #ef4444;
  --red-bg: rgba(239, 68, 68, 0.12);
  --blue: #3b82f6;
  --blue-bg: rgba(59, 130, 246, 0.12);
  --slate: #64748b;
  --slate-bg: rgba(100, 116, 139, 0.12);
  --orange: #f97316;
  --orange-bg: rgba(249, 115, 22, 0.12);
  --purple: #a855f7;
  --radius: 8px;
  --radius-sm: 6px;
  --radius-lg: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
}

html { font-size: 14px; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Layout */
.app { max-width: 1280px; margin: 0 auto; padding: 24px 24px 0; min-height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 20px; border-bottom: 1px solid var(--border-light); margin-bottom: 24px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--accent); }
.logo span { color: var(--text-muted); font-weight: 400; }
.header-right { display: flex; align-items: center; gap: 16px; color: var(--text-muted); font-size: 12px; }
.refresh-btn {
  background: var(--bg-surface); border: 1px solid var(--border-light); color: var(--text-secondary);
  padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; font-family: inherit;
  transition: all 0.15s; display: flex; align-items: center; gap: 6px;
}
.refresh-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
.refresh-btn svg { width: 14px; height: 14px; }

/* Stats Bar */
.stats-bar {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin-bottom: 28px;
}
.stat-card {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 18px; display: flex; flex-direction: column; gap: 4px;
}
.stat-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
.stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
.stat-bar-vis {
  height: 4px; border-radius: 2px; background: var(--bg-elevated); margin-top: 6px; overflow: hidden;
}
.stat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* Project Grid */
.projects-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px; margin-bottom: 24px;
}

/* Project Card */
.project-card {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 0; cursor: pointer; transition: all 0.15s;
}
.project-card:hover { border-color: var(--accent-dim); background: var(--bg-surface-hover); }
.project-card.active { border-color: var(--accent); }
.project-card-header {
  padding: 16px 18px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.project-info { flex: 1; min-width: 0; }
.project-name {
  font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 8px;
}
.project-shorthand {
  font-size: 10px; font-weight: 600; background: var(--accent); color: #0f172a;
  padding: 1px 7px; border-radius: 4px; letter-spacing: 0.03em;
}
.project-desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.project-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; display: flex; gap: 12px; }
.project-stats-dots {
  display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0;
}
.project-total { font-size: 20px; font-weight: 700; color: var(--text-primary); line-height: 1; }
.project-total-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

/* Progress bar inside card */
.progress-bar-container {
  padding: 0 18px 12px;
}
.progress-bar {
  height: 4px; border-radius: 2px; background: var(--bg-elevated); overflow: hidden; display: flex;
}
.progress-segment { height: 100%; transition: width 0.3s ease; }
.progress-done { background: var(--green); }
.progress-inprogress { background: var(--yellow); }
.progress-todo { background: var(--accent-dim); }
.progress-backlog { background: var(--slate); }

/* Ticket breakdown row */
.ticket-breakdown {
  padding: 0 18px 14px; display: flex; gap: 16px;
}
.ticket-breakdown-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
.ticket-breakdown-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-done { background: var(--green); }
.dot-inprogress { background: var(--yellow); }
.dot-todo { background: var(--accent-dim); }
.dot-backlog { background: var(--slate); }
.breakdown-count { font-weight: 600; color: var(--text-secondary); }

/* Ticket list (expandable) */
.ticket-section {
  border-top: 1px solid var(--border); display: none;
}
.project-card.active .ticket-section { display: block; }
.ticket-section-header {
  padding: 12px 18px 8px; font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-muted);
}
.ticket-list { list-style: none; }
.ticket-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 18px; border-bottom: 1px solid var(--border); font-size: 13px;
  transition: background 0.1s;
}
.ticket-item:last-child { border-bottom: none; }
.ticket-item:hover { background: var(--bg-surface-hover); }
.ticket-id { font-size: 11px; font-weight: 500; color: var(--text-muted); min-width: 56px; font-variant-numeric: tabular-nums; }
.ticket-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ticket-badges { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

/* Status badges */
.status-badge {
  font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 10px;
  text-transform: capitalize; letter-spacing: 0.02em;
}
.status-done { background: var(--green-bg); color: var(--green); }
.status-inprogress { background: var(--yellow-bg); color: var(--yellow); }
.status-todo { background: var(--blue-bg); color: var(--blue); }
.status-backlog { background: var(--slate-bg); color: var(--slate); }

/* Priority badges */
.priority-badge {
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px;
  font-variant-numeric: tabular-nums;
}
.priority-P0 { background: var(--red-bg); color: var(--red); }
.priority-P1 { background: var(--orange-bg); color: var(--orange); }
.priority-P2 { background: var(--yellow-bg); color: var(--yellow); }
.priority-P3 { background: var(--slate-bg); color: var(--slate); }

/* Tags */
.tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag {
  font-size: 10px; padding: 1px 6px; border-radius: 4px;
  background: var(--bg-elevated); color: var(--text-secondary);
}

/* Loading / Error states */
.loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; padding: 80px 20px; color: var(--text-muted);
}
.spinner { width: 32px; height: 32px; border: 3px solid var(--border-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-state {
  text-align: center; padding: 60px 20px; color: var(--red);
}
.error-state p { margin-top: 8px; font-size: 13px; color: var(--text-secondary); }

/* Empty state */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
  grid-column: 1 / -1;
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty-state h3 { font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
.empty-state p { font-size: 13px; }

/* Footer */
.footer {
  margin-top: auto; padding: 20px 0; border-top: 1px solid var(--border-light);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 11px; color: var(--text-muted);
}
.footer-version { font-weight: 500; }
.footer-refresh { }

/* Loading skeleton */
.skeleton { background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-surface-hover) 50%, var(--bg-elevated) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-card { height: 140px; border-radius: var(--radius); margin-bottom: 12px; }
.skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* Responsive */
@media (max-width: 768px) {
  .app { padding: 16px 12px 0; }
  .header { flex-direction: column; align-items: flex-start; gap: 12px; }
  .header-right { width: 100%; justify-content: space-between; }
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
  .projects-grid { grid-template-columns: 1fr; }
  .ticket-item { flex-wrap: wrap; gap: 6px; }
  .ticket-name { width: 100%; order: -1; white-space: normal; }
  .ticket-badges { margin-left: auto; }
  .footer { flex-direction: column; gap: 4px; text-align: center; }
}

@media (max-width: 480px) {
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .stat-value { font-size: 20px; }
}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">lore <span>dashboard</span></div>
    </div>
    <div class="header-right">
      <span id="lastRefresh"></span>
      <button class="refresh-btn" onclick="loadDashboard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        Refresh
      </button>
    </div>
  </header>

  <!-- Stats Bar -->
  <div id="statsBar" class="stats-bar"></div>

  <!-- Project Grid -->
  <div id="projectGrid" class="projects-grid"></div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-version">lore v0.1.0</div>
    <div class="footer-refresh" id="footerRefresh">—</div>
  </footer>
</div>

<script>
const LORE_VERSION = '0.1.0';
let expandedProject = null;

async function loadDashboard() {
  const grid = document.getElementById('projectGrid');
  const statsBar = document.getElementById('statsBar');
  const refreshEl = document.getElementById('lastRefresh');
  const footerRefresh = document.getElementById('footerRefresh');
  const now = new Date();

  const timeStr = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const dateStr = now.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  refreshEl.textContent = `${dateStr} ${timeStr}`;
  footerRefresh.textContent = `Last refreshed: ${dateStr} ${timeStr}`;

  // Show skeletons
  statsBar.innerHTML = Array(5).fill('').map(() =>
    `<div class="stat-card"><div class="skeleton" style="height:12px;width:60px;margin-bottom:6px"></div><div class="skeleton" style="height:28px;width:80px"></div></div>`
  ).join('');
  grid.innerHTML = '<div class="skeleton-grid">' + Array(3).fill('').map(() =>
    '<div class="skeleton skeleton-card"></div>'
  ).join('') + '</div>';

  try {
    const res = await fetch('/api/projects');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderDashboard(data);
  } catch (err) {
    statsBar.innerHTML = '';
    grid.innerHTML = `
      <div class="error-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h3>Failed to load dashboard</h3>
        <p>${err.message} — Is the lore server running on port 8080?</p>
      </div>
    `;
  }
}

function renderDashboard(data) {
  const { projects, stats } = data;
  renderStatsBar(stats);
  renderProjectGrid(projects);
}

function renderStatsBar(stats) {
  const bar = document.getElementById('statsBar');
  const donePct = stats.total_tickets > 0 ? ((stats.total_done / stats.total_tickets) * 100).toFixed(1) : 0;
  const todoPct = stats.total_tickets > 0 ? ((stats.total_todo / stats.total_tickets) * 100).toFixed(1) : 0;

  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Projects</div>
      <div class="stat-value" style="color:var(--accent)">${stats.total_projects}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Tickets</div>
      <div class="stat-value">${stats.total_tickets}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Done</div>
      <div class="stat-value" style="color:var(--green)">${stats.total_done}</div>
      <div class="stat-sub">${donePct}% complete</div>
      <div class="stat-bar-vis"><div class="stat-bar-fill" style="width:${donePct}%;background:var(--green)"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">In Progress</div>
      <div class="stat-value" style="color:var(--yellow)">${stats.total_inprogress}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Todo</div>
      <div class="stat-value" style="color:var(--blue)">${stats.total_todo}</div>
      <div class="stat-sub">${stats.total_backlog} backlog</div>
      <div class="stat-bar-vis"><div class="stat-bar-fill" style="width:${todoPct}%;background:var(--blue)"></div></div>
    </div>
  `;
}

function renderProjectGrid(projects) {
  const grid = document.getElementById('projectGrid');

  if (!projects || projects.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <h3>No projects yet</h3>
        <p>Create your first project with <code>lore create project</code></p>
      </div>
    `;
    return;
  }

  grid.innerHTML = projects.map(p => {
    const donePct = p.total > 0 ? ((p.done / p.total) * 100) : 0;
    const inprogPct = p.total > 0 ? ((p.inprogress / p.total) * 100) : 0;
    const todoPct = p.total > 0 ? ((p.todo / p.total) * 100) : 0;
    const backlogPct = p.total > 0 ? ((p.backlog / p.total) * 100) : 0;

    const isActive = expandedProject === p.uid;

    return `
      <div class="project-card${isActive ? ' active' : ''}" data-uid="${p.uid}" onclick="toggleProject('${p.uid}')">
        <div class="project-card-header">
          <div class="project-info">
            <div class="project-name">
              ${p.project}
              <span class="project-shorthand">${p.shorthand}</span>
            </div>
            <div class="project-desc">${escapeHtml(p.description || '')}</div>
            <div class="project-meta">
              <span>📁 ${p.working_dir || ''}</span>
              <span>📅 ${p.created_at || ''}</span>
            </div>
          </div>
          <div class="project-stats-dots">
            <div class="project-total">${p.total}</div>
            <div class="project-total-label">tickets</div>
          </div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar">
            ${donePct > 0 ? `<div class="progress-segment progress-done" style="width:${donePct}%"></div>` : ''}
            ${inprogPct > 0 ? `<div class="progress-segment progress-inprogress" style="width:${inprogPct}%"></div>` : ''}
            ${todoPct > 0 ? `<div class="progress-segment progress-todo" style="width:${todoPct}%"></div>` : ''}
            ${backlogPct > 0 ? `<div class="progress-segment progress-backlog" style="width:${backlogPct}%"></div>` : ''}
          </div>
        </div>
        <div class="ticket-breakdown">
          <div class="ticket-breakdown-item">
            <span class="ticket-breakdown-dot dot-done"></span>
            Done <span class="breakdown-count">${p.done}</span>
          </div>
          <div class="ticket-breakdown-item">
            <span class="ticket-breakdown-dot dot-inprogress"></span>
            In Progress <span class="breakdown-count">${p.inprogress}</span>
          </div>
          <div class="ticket-breakdown-item">
            <span class="ticket-breakdown-dot dot-todo"></span>
            Todo <span class="breakdown-count">${p.todo}</span>
          </div>
          <div class="ticket-breakdown-item">
            <span class="ticket-breakdown-dot dot-backlog"></span>
            Backlog <span class="breakdown-count">${p.backlog}</span>
          </div>
        </div>
        <div class="ticket-section">
          <div class="ticket-section-header">Tickets</div>
          <ul class="ticket-list" id="ticketList-${p.uid}">
            <li class="loading" style="padding:16px"><div class="spinner" style="width:18px;height:18px;border-width:2px"></div><span style="font-size:12px">Loading tickets...</span></li>
          </ul>
        </div>
      </div>
    `;
  }).join('');

  // Auto-load tickets for the active project
  if (expandedProject) {
    loadTickets(expandedProject);
  }
}

function toggleProject(uid) {
  const prev = expandedProject;
  // Collapse previous
  if (prev && prev !== uid) {
    const prevCard = document.querySelector(`.project-card[data-uid="${prev}"]`);
    if (prevCard) prevCard.classList.remove('active');
  }

  const card = document.querySelector(`.project-card[data-uid="${uid}"]`);
  if (!card) return;

  const isOpening = prev !== uid;
  expandedProject = isOpening ? uid : null;

  if (isOpening) {
    card.classList.add('active');
    loadTickets(uid);
  } else {
    card.classList.remove('active');
  }
}

async function loadTickets(uid) {
  const list = document.getElementById(`ticketList-${uid}`);
  if (!list) return;

  // If already loaded with content, skip
  if (list.dataset.loaded === 'true') return;

  try {
    const res = await fetch(`/api/tickets?session=${uid}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderTickets(list, data.tickets);
    list.dataset.loaded = 'true';
  } catch (err) {
    list.innerHTML = `<li class="error-state" style="padding:16px;font-size:12px">Failed to load: ${err.message}</li>`;
  }
}

function renderTickets(list, tickets) {
  if (!tickets || tickets.length === 0) {
    list.innerHTML = `<li style="padding:16px;text-align:center;color:var(--text-muted);font-size:12px">No tickets in this session</li>`;
    return;
  }

  list.innerHTML = tickets.map(t => {
    const statusClass = `status-${t.status}`;
    const priorityClass = `priority-${t.priority}`;
    const statusLabel = t.status === 'inprogress' ? 'in prog' : t.status;

    return `
      <li class="ticket-item">
        <span class="ticket-id">${escapeHtml(t.id)}</span>
        <span class="ticket-name">${escapeHtml(t.name)}</span>
        <div class="ticket-badges">
          <div class="tags">
            ${(t.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
          </div>
          <span class="priority-badge ${priorityClass}">${escapeHtml(t.priority)}</span>
          <span class="status-badge ${statusClass}">${statusLabel}</span>
        </div>
      </li>
    `;
  }).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Initial load on page ready
document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
